name: TV workflow bot

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

jobs:
  probe-stream-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe IPTV search sources
        run: node scripts/stream-workflow-bot.mjs
